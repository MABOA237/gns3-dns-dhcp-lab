{
   "Dhcp4": {
       "interfaces-config": {
             "interfaces": [
                  "ens3"
             ]
       },
       "valid-lifetime": 691200,
       "renew-timer": 345600,
       "rebind-timer": 604800,
       "authoritative": true,
       "lease-database": {
              "type": "memfile",
              "persist": true,
              "name": "var/lib/kea/kea-leases4.csv",
              "lfc-interval": 3600
       },

       //CONFIGURATION DE LA HAUTE DISPONIBILITE
       "hooks-libraries": [
           {
               "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_lease_cmds.so"
           },
           {
               "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_ha.so",
               "parameters": {
                   "high-availability": [
                          {
                             "name": "mon-cluster-dhcp",
                             "mode": "load-balancing",
                             "this-server-name": "serveur-primaire",
                             "peers": [
                                {
                                    "name": "serveur-primaire",
                                    "url": "http://192.168.10.200:8000/",
                                    "role": "primary"
                                },
                                {
                                    "name": "serveur-secondaire",
                                    "url": "http://192.168.10.201:8000/",
                                    "role": "secondary"
                                }
                             ]
                          }
                   ]
               }
            }
        ],
       "subnet4": [
          { 
              "id": 1,
              "subnet": "192.168.10.0/24",
              "pools": [
                 {
                      "pool": "192.168.10.20 - 192.168.10.30"
                 }
              ],
              "option-data": [
                 {
                      "name": "domain-name-servers",
                      "data": "192.168.10.100, 192.168.10.101"
                 },
                 {
                      "name": "domain-search",
                      "data": "mejj.com"
                 },
                 {
                      "name": "routers",
                      "data": "192.168.10.1"
                 }
               ]
           },
           {
              "id": 2,
              "subnet": "192.168.20.0/24",
              "pools": [
                 {
                       "pool": "192.168.20.80 - 192.168.20.90"
                 }
              ],
              "option-data": [
                  {
                       "name": "domain-name-servers",
                       "data": "192.168.10.100, 192.168.10.101"
                  },
                  {
                       "name": "domain-search",
                       "data": "mejj.com"
                  },
                  {
                       "name": "routers",
                       "data": "192.168.20.1"
                  }
             ]
          }
        ]
     }
}
